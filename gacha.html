<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シャー芯ガチャ</title>

<style>

/* =========================
  基本
========================= */

body{
    margin:0;
    font-family:"Yu Gothic","Meiryo",sans-serif;
    background:#f5f5f5;
    font-size:18px;
}

/* =========================
  文字強化（重要）
========================= */

.title{
    font-size:82px;
    text-align:center;
    letter-spacing:8px;
    font-weight:bold;
}

.sub{
    font-size:20px;
    text-align:center;
    color:#666;
}

.power{
    font-size:58px;
    font-weight:bold;
    color:#d10000;
    text-align:center;
}

/* ボタン */
.btn{
    font-size:20px;
    padding:22px 48px;
    border-radius:16px;
    border:none;
    cursor:pointer;
}

/* =========================
  ガチャ演出
========================= */

.gacha-animation{
    width:240px;
    height:240px;
    border-radius:50%;
    border:12px solid rgba(0,0,0,0.08);
    border-top:12px solid #d10000;
    animation:spin 1s linear infinite;
    position:absolute;
    inset:0;
    margin:auto;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes pulse{
    0%{transform:scale(0.9);opacity:0.5;}
    50%{transform:scale(1.2);opacity:1;}
    100%{transform:scale(0.9);opacity:0.5;}
}

/* フラッシュ */
.flash{
    position:fixed;
    inset:0;
    pointer-events:none;
    animation:flash .6s ease;
}

@keyframes flash{
    from{opacity:1;}
    to{opacity:0;}
}

/* 揺れ */
@keyframes shake{
    0%{transform:translate(2px,2px);}
    50%{transform:translate(-2px,-2px);}
    100%{transform:translate(1px,-1px);}
}

.glitch{
    animation:shake .15s infinite;
}

/* ロードバー */
.bar{
    width:80%;
    height:14px;
    background:linear-gradient(90deg,#ffcc00,#ff3300,#ffcc00);
    border-radius:999px;
    animation:load 2.2s ease forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

/* =========================
  結果表示
========================= */

.big-name{
    font-size:120px;
    font-weight:bold;
    text-align:center;
}

.rarity{
    font-size:40px;
    text-align:center;
    letter-spacing:10px;
}

.type{
    font-size:26px;
    text-align:center;
}

.desc{
    font-size:22px;
    text-align:center;
    color:#666;
    line-height:2;
}

</style>

</head>

<body>

<div class="title">シャー芯ガチャ</div>
<div class="sub">運命の芯を引け</div>

<div class="power" id="powerText">芯ポイント: 0</div>

<div style="text-align:center;margin:30px;">
<button class="btn" onclick="drawGacha()">単発</button>
<button class="btn" onclick="draw10()">10連</button>
</div>

<div id="result" style="min-height:500px;text-align:center;position:relative;"></div>

<script>

/* =========================
  データ
========================= */

const items = [
{ name:"HB", rarity:"R", chance:60, color:"#666", desc:"普通", type:"王道" },
{ name:"2B", rarity:"SR", chance:25, color:"#0077ff", desc:"濃い", type:"濃密" },
{ name:"0.3mm", rarity:"SSR", chance:10, color:"#ffcc00", desc:"精密", type:"レア" },
{ name:"赤芯", rarity:"UR", chance:4, color:"#7a00ff", desc:"伝説", type:"神域" },
{ name:"ルンべの遺芯", rarity:"LR", chance:1, color:"#ff0000", desc:"終焉", type:"禁断" }
];

/* =========================
  ガチャ
========================= */

function randomItem(){
    let r = Math.random()*100;
    let sum = 0;

    for(const i of items){
        sum += i.chance;
        if(r <= sum) return i;
    }
}

/* =========================
  演出
========================= */

function startAnimation(){

    document.getElementById("result").innerHTML = `
        <div style="position:relative;height:300px;">
            <div class="gacha-animation"></div>
        </div>
        <div style="font-size:48px;margin-top:40px;">
            ガチャ中...
        </div>
        <div class="bar" style="margin:auto;margin-top:30px;"></div>
    `;
}

/* =========================
  結果
========================= */

function displayResult(item){

    let bg = "#fff";
    let effect = "";

    if(item.rarity==="SSR"){
        bg="radial-gradient(circle,#fff3b0,#ffb703)";
    }

    if(item.rarity==="UR"){
        bg="radial-gradient(circle,#7a00ff,#1a0033)";
        document.body.classList.add("glitch");
        setTimeout(()=>document.body.classList.remove("glitch"),500);
    }

    if(item.rarity==="LR"){
        bg="radial-gradient(circle,#000,#400,#900)";
        document.body.classList.add("glitch");
        setTimeout(()=>document.body.classList.remove("glitch"),700);
    }

    document.getElementById("result").style.background = bg;

    document.getElementById("result").innerHTML = `

        <div class="rarity" style="color:${item.color}">
            ${item.rarity}
        </div>

        <div class="big-name" style="color:${item.color}">
            ${item.name}
        </div>

        <div class="type">${item.type}</div>

        <div class="desc">${item.desc}</div>

        <div style="margin-top:20px;">
            排出率 ${item.chance}%
        </div>

    `;
}

/* =========================
  単発
========================= */

function drawGacha(){

    startAnimation();

    setTimeout(()=>{
        const item = randomItem();
        displayResult(item);
    },2000);
}

/* =========================
  10連
========================= */

function draw10(){

    startAnimation();

    setTimeout(()=>{

        let html = "";

        for(let i=0;i<10;i++){
            const item = randomItem();

            html += `
            <div style="margin:10px;padding:10px;border:1px solid #ddd;">
                <div style="color:${item.color};font-size:22px;">
                    ${item.rarity} ${item.name}
                </div>
            </div>`;
        }

        document.getElementById("result").innerHTML = html;

    },2200);
}

</script>

</body>
</html>
