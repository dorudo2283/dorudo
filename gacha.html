<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シャー芯ガチャ | 日本シャー芯協会</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

body{
    background:#0f0f14;
    color:#fff;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,200,0,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.08), transparent 45%);
    z-index:-1;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.5);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:999;
}

.logo{
    font-size:30px;
    letter-spacing:4px;
    font-weight:bold;
}
.logo span{color:#ff2d2d;}
.back{color:#aaa;text-decoration:none;}

/* BOX */
.main{
    padding:140px 20px 80px;
    display:flex;
    justify-content:center;
}

.gacha-box{
    width:min(1100px,100%);
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:22px;
    padding:50px;
    backdrop-filter:blur(12px);
}

/* TITLE */
.title{
    font-size:72px;
    text-align:center;
    letter-spacing:6px;
}
.sub{
    text-align:center;
    margin-top:10px;
    color:#aaa;
    font-size:18px;
}

/* POWER */
.power{
    text-align:center;
    font-size:44px;
    margin-top:30px;
    color:#ff3b3b;
}

/* BUTTON */
.buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    margin-top:40px;
    flex-wrap:wrap;
}

.btn{
    padding:18px 35px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    transition:.2s;
}
.btn:hover{transform:scale(1.05);}

.normal{background:#222;color:#fff;}
.special{background:#ff2d2d;color:#fff;}
.oracle{background:#ffcc00;color:#000;}

/* RESULT */
#result{
    margin-top:50px;
    min-height:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    border-radius:18px;
    padding:40px;
    position:relative;
}

/* ANIM */
@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.loader{
    width:180px;
    height:180px;
    border-radius:50%;
    border:10px solid rgba(255,255,255,0.1);
    border-top:10px solid #ff2d2d;
    animation:spin 1s linear infinite;
}

/* FLASH */
.flash{
    position:fixed;
    inset:0;
    animation:flash .5s ease;
    pointer-events:none;
}
@keyframes flash{
    from{opacity:1;}
    to{opacity:0;}
}

/* BIG TEXT */
.big{
    font-size:110px;
    font-weight:bold;
}

.rarity{
    font-size:28px;
    letter-spacing:8px;
    opacity:0.8;
}

.desc{
    margin-top:20px;
    color:#bbb;
    font-size:18px;
}

/* MINI GAME */
.bar{
    width:100%;
    height:40px;
    background:#222;
    border-radius:50px;
    position:relative;
    margin-top:30px;
}

.zone{
    position:absolute;
    left:45%;
    width:10%;
    height:100%;
    background:#00ff99;
}

.pointer{
    position:absolute;
    width:6%;
    height:100%;
    background:#fff;
    left:0%;
}

.reaction{
    margin-top:20px;
    height:160px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    background:#222;
    border-radius:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">シャー芯<span>ガチャ</span></div>
<a class="back" href="#">TOP</a>
</header>

<div class="main">
<div class="gacha-box">

<div class="title">シャー芯ガチャ</div>
<div class="sub">運命は鉛筆の中にある</div>

<div class="power" id="power">芯ポイント: 0</div>

<div class="buttons">
<button class="btn oracle" onclick="addPower()">お告げ +1</button>
<button class="btn normal" onclick="draw()">単発 -10</button>
<button class="btn special" onclick="draw10()">10連 -100</button>
</div>

<div id="result">
<div class="loader"></div>
</div>

<!-- ミニゲーム -->
<div style="margin-top:60px;">

<h2>ミニゲーム</h2>

<div class="bar">
<div class="zone"></div>
<div class="pointer" id="ptr"></div>
</div>

<div class="buttons">
<button class="btn special" onclick="startBar()">開始</button>
<button class="btn normal" onclick="stopBar()">停止</button>
</div>

<div class="reaction" id="react" onclick="react()">待機中</div>

</div>

</div>
</div>

<script>

let power = 0;
let ptr = 0;
let dir = 1;
let interval;
let running = false;

function update(){
document.getElementById("power").innerText = "芯ポイント: " + power;
}

function addPower(){
power++;
update();
flash();
}

function flash(){
const d = document.createElement("div");
d.className="flash";
d.style.background="white";
document.body.appendChild(d);
setTimeout(()=>d.remove(),500);
}

const items=[
{name:"HB",rarity:"R",chance:60,color:"#aaa"},
{name:"2B",rarity:"SR",chance:25,color:"#4af"},
{name:"SSR芯",rarity:"SSR",chance:12,color:"#ffcc00"},
{name:"UR芯",rarity:"UR",chance:3,color:"#ff2d2d"}
];

function random(){
let r=Math.random()*100;
let t=0;
for(let i of items){
t+=i.chance;
if(r<t)return i;
}
}

function anim(){
document.getElementById("result").innerHTML=`
<div class="loader"></div>
<div style="margin-top:20px;font-size:28px;">ガチャ中...</div>
`;
}

function draw(){
if(power<10)return;
power-=10;
update();
anim();

setTimeout(()=>{
let item=random();
show(item);
},1500);
}

function draw10(){
if(power<100)return;
power-=100;
update();
anim();

setTimeout(()=>{
let html="";
for(let i=0;i<10;i++){
let item=random();
html+=`<div style="margin:10px;font-size:20px;color:${item.color}">
${item.rarity} ${item.name}</div>`;
}
document.getElementById("result").innerHTML=html;
},1500);
}

function show(item){
document.getElementById("result").innerHTML=`
<div class="rarity">${item.rarity}</div>
<div class="big" style="color:${item.color}">${item.name}</div>
<div class="desc">シャー芯の覚醒個体</div>
`;
}

/* bar */
function startBar(){
if(running)return;
running=true;
interval=setInterval(()=>{
ptr+=dir*2;
if(ptr>94||ptr<0)dir*=-1;
document.getElementById("ptr").style.left=ptr+"%";
},10);
}

function stopBar(){
running=false;
clearInterval(interval);
if(ptr>44&&ptr<54){
power+=50;
update();
alert("PERFECT +50");
}else{
alert("MISS");
}
}

/* reaction */
let ready=false;
let t0=0;

function react(){
if(!ready)return;
let dt=(Date.now()-t0)/1000;
ready=false;

if(dt<0.2)power+=100;
else if(dt<0.35)power+=50;

update();
document.getElementById("react").innerText=dt.toFixed(3)+"s";
}

setInterval(()=>{
if(Math.random()<0.01){
ready=true;
t0=Date.now();
document.getElementById("react").innerText="押せ";
}
},100);

update();

</script>

</body>
</html>
