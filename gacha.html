<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>シャー芯ガチャ | 日本シャー芯協会</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

body{
    background:#f5f5f5;
    color:#111;
    overflow-x:hidden;
}

/* 背景 */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);

    background-size:40px 40px;

    z-index:-1;

}

/* HEADER */

header{

    position:fixed;
    top:0;
    width:100%;

    padding:24px 9%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(10px);

    background:rgba(255,255,255,0.75);

    border-bottom:1px solid rgba(0,0,0,0.08);

    z-index:999;

}

.logo{

    font-size:28px;
    font-weight:bold;
    letter-spacing:5px;

}

.logo span{

    color:#d10000;

}

.back{

    text-decoration:none;
    color:#333;

}

/* MAIN */

.main{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:150px 20px 80px;

}

.gacha-box{

    width:min(1200px,100%);

    background:white;

    border:1px solid rgba(0,0,0,0.08);

    padding:60px;

    border-radius:20px;

    box-shadow:0 15px 50px rgba(0,0,0,0.08);

}

/* タイトル */

.title{

    font-size:65px;

    text-align:center;

    letter-spacing:6px;

}

.sub{

    text-align:center;

    margin-top:20px;

    color:#666;

    line-height:2;

}

/* 芯力 */

.power-box{

    margin-top:40px;

    text-align:center;

}

.power{

    font-size:42px;

    font-weight:bold;

    color:#d10000;

    letter-spacing:4px;

}

.power-sub{

    margin-top:12px;

    color:#777;

    letter-spacing:3px;

}

/* ボタン */

.buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-top:45px;

    flex-wrap:wrap;

}

.btn{

    padding:18px 40px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    transition:.3s;

    font-size:16px;

    letter-spacing:3px;

}

.btn:hover{

    transform:translateY(-6px);

}

.normal{

    background:#111;
    color:white;

}

.special{

    background:#d10000;
    color:white;

}

.oracle{

    background:#ffcc00;
    color:#111;

}

/* RESULT */

#result{

    min-height:520px;

    margin-top:60px;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    transition:1s;

    border-radius:20px;

    padding:40px;

    position:relative;

    overflow:hidden;

}

/* 演出 */

.gacha-animation{

    width:220px;
    height:220px;

    border-radius:50%;

    border:12px solid rgba(0,0,0,0.08);

    border-top:12px solid #d10000;

    animation:spin 1s linear infinite;

    position:absolute;

    inset:0;

    margin:auto;

}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}

/* 発光 */

@keyframes pulse{

    0%{
        transform:scale(0.9);
        opacity:0.5;
    }

    50%{
        transform:scale(1.2);
        opacity:1;
    }

    100%{
        transform:scale(0.9);
        opacity:0.5;
    }

}

/* ロードバー */

@keyframes loadingBar{

    from{
        transform:translateX(-100%);
    }

    to{
        transform:translateX(0%);
    }

}

/* SSR */

@keyframes ssrFlash{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.05);
    }

}

/* UR */

@keyframes urFlash{

    from{
        transform:scale(1);
        filter:brightness(1);
    }

    to{
        transform:scale(1.08);
        filter:brightness(1.8);
    }

}

/* 揺れ */

@keyframes shake{

    0%{
        transform:translate(2px,2px);
    }

    25%{
        transform:translate(-2px,1px);
    }

    50%{
        transform:translate(2px,-2px);
    }

    75%{
        transform:translate(-1px,2px);
    }

    100%{
        transform:translate(1px,-1px);
    }

}

/* フラッシュ */

.flash{

    position:fixed;

    inset:0;

    pointer-events:none;

    animation:flash .6s ease;

    z-index:999999;

}

@keyframes flash{

    from{
        opacity:1;
    }

    to{
        opacity:0;
    }

}

/* 10連 */

.multi-results{

    width:100%;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(170px,1fr));

    gap:18px;

    margin-top:40px;

}

.multi-card{

    background:white;

    border:1px solid rgba(0,0,0,0.08);

    padding:25px;

    border-radius:14px;

    transition:.3s;

}

.multi-card:hover{

    transform:translateY(-5px);

}

/* ステータス */

.status-box{

    margin-top:30px;

    display:flex;

    gap:20px;

    justify-content:center;

    flex-wrap:wrap;

}

.status{

    background:#fafafa;

    border:1px solid rgba(0,0,0,0.08);

    padding:15px 25px;

    border-radius:10px;

    font-size:14px;

    letter-spacing:2px;

}

/* ミニゲーム */

.mini-section{

    margin-top:100px;

}

.game-select{

    display:flex;

    gap:20px;

    flex-wrap:wrap;

    margin-top:30px;

}

.game-card{

    flex:1;

    min-width:260px;

    background:#fafafa;

    border:1px solid rgba(0,0,0,0.08);

    padding:30px;

    border-radius:14px;

    transition:.3s;

}

.game-card:hover{

    transform:translateY(-6px);

}

.game-card h3{

    margin-bottom:15px;

}

.game-card p{

    color:#666;

    line-height:2;

    margin-bottom:20px;

}

/* バーゲーム */

.bar-area{

    width:100%;
    height:40px;

    background:#eee;

    border-radius:50px;

    overflow:hidden;

    position:relative;

    margin-top:30px;

}

#successZone{

    position:absolute;

    left:45%;

    width:10%;

    height:100%;

    background:#00aa88;

}

#movingBar{

    position:absolute;

    left:0%;

    width:6%;

    height:100%;

    background:#111;

}

/* 反応ゲーム */

.reaction-box{

    margin-top:40px;

    width:100%;

    height:200px;

    border-radius:20px;

    background:#ddd;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:34px;

    cursor:pointer;

    user-select:none;

    transition:.2s;

}

/* 所持 */

.inventory{

    margin-top:100px;

}

.inventory h2{

    margin-bottom:30px;

    letter-spacing:4px;

}

.inventory-item{

    background:white;

    margin-bottom:15px;

    padding:22px;

    border-radius:12px;

    border:1px solid rgba(0,0,0,0.08);

}

/* FOOTER */

footer{

    text-align:center;

    padding:50px;

    color:#666;

    font-size:13px;

}

/* スマホ */

@media(max-width:700px){

    .title{
        font-size:42px;
    }

    .gacha-box{
        padding:35px 20px;
    }

}

</style>
</head>

<body>

<section class="main">

<div class="gacha-box">

    </div>

    <div class="sub">

    <div class="power-box">

        <div class="power" id="powerText">

        onclick="draw10()">

            -100芯ポイント　ガチャる-

<script>

// =========================
// アイテム
// =========================

const items = [

{
    name:"HB",
    rarity:"R",
    chance:50,
    color:"#666",
    desc:"最も一般的なシャー芯。",
    type:"王道シャー芯"
},

{
    name:"2B",
    rarity:"SR",
    chance:28,
    color:"#0077ff",
    desc:"濃さに特化したシャー芯。",
    type:"濃密シャー芯"
},

{
    name:"0.3mm",
    rarity:"SR",
    chance:14,
    color:"#00aa88",
    desc:"扱える者は少ない。",
    type:"精密シャー芯"
},

{
    name:"赤芯",
    rarity:"SSR",
    chance:6,
    color:"#ffbb00",
    desc:"教祖様が愛した伝説級シャー芯。（知らんけど）",
    type:"神聖シャー芯"
},

{
    name:"0.0mm",
    rarity:"UR",
    chance:1.8,
    color:"#7a00ff",
    desc:"存在しないはずのシャー芯。（１８禁！？ｗ）",
    type:"禁断シャー芯"
},

{
    name:"ルンべの遺芯",
    rarity:"LR",
    chance:0.2,
    color:"#ff0000",
    desc:"ルンべの遺産。",
    type:"終焉シャー芯"
}

];

// =========================
// ロード文
// =========================

const loadingMessages = [

"ＳＳＲでるといいね！ｗ",

];

// =========================
// 
// =========================

function getPower(){

    return Number(
        localStorage.getItem("corePower")
    ) || 0;

}

function savePower(power){

    localStorage.setItem(
        "corePower",
        power
    );

}

function updatePower(){

    document.getElementById("powerText")
    .innerHTML =
    `芯ポイント : ${getPower()}`;

}

// =========================
// 所持
// =========================

function getInventory(){

    return JSON.parse(
        localStorage.getItem("leadInventory")
    ) || [];

}

function saveInventory(data){

    localStorage.setItem(
        "leadInventory",
        JSON.stringify(data)
    );

}

// =========================
// 表示
// =========================

function showInventory(){

    const inventory = getInventory();

    let grouped = {};

    inventory.forEach(item=>{

        const key = item.name;

        if(!grouped[key]){

            grouped[key] = {
                ...item,
                count:0
            };

        }

        grouped[key].count++;

    });

    let html = "";

    Object.values(grouped).forEach(item=>{

        html += `

        <div class="inventory-item"
        style="
        border-left:6px solid ${item.color};
        ">

            <div style="
            color:${item.color};
            font-weight:bold;
            letter-spacing:4px;
            ">
                ${item.rarity}
            </div>

            <div style="
            font-size:32px;
            margin-top:10px;
            color:${item.color};
            font-weight:bold;
            ">
                ${item.name}
            </div>

            <div style="
            margin-top:10px;
            color:#666;
            ">
                ${item.type}
            </div>

            <div style="
            margin-top:15px;
            ">
                所持数 × ${item.count}
            </div>

        </div>

        `;

    });

    if(html === ""){

        html = `

        <div class="inventory-item">
            まだシャー芯は存在しません。
        </div>

        `;

    }

    document.getElementById("inventoryList")
    .innerHTML = html;

}

// =========================
// 抽選
// =========================

function randomItem(){

    let random = Math.random() * 100;

    let total = 0;

    for(const item of items){

        total += item.chance;

        if(random <= total){

            return item;

        }

    }

}

// =========================
// 演出
// =========================

function startAnimation(){

    const randomMessage =

    loadingMessages[
        Math.floor(
            Math.random() * loadingMessages.length
        )
    ];

    document.getElementById("result")
    .style.background = "#fff";

    document.getElementById("result")
    .innerHTML =

    `

    <div style="
    position:relative;
    width:260px;
    height:260px;
    ">

        <div style="
        position:absolute;
        inset:0;
        border-radius:50%;
        background:
        radial-gradient(circle,
        rgba(255,255,255,1) 0%,
        rgba(255,220,120,0.7) 35%,
        rgba(255,180,0,0) 70%);
        animation:pulse 1.4s infinite;
        ">
        </div>

        <div class="gacha-animation"></div>

    </div>

    <div style="
    margin-top:45px;
    font-size:34px;
    letter-spacing:5px;
    font-weight:bold;
    animation:ssrFlash .8s infinite alternate;
    ">
        ガチャ中...
    </div>

    <div style="
    margin-top:20px;
    color:#666;
    letter-spacing:3px;
    font-size:16px;
    ">
        ${randomMessage}
    </div>

    <div style="
    margin-top:30px;
    width:320px;
    height:10px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
    ">

        <div style="
        width:100%;
        height:100%;
        background:
        linear-gradient(
        90deg,
        #ffcc00,
        #ff8800,
        #ffcc00
        );
        animation:loadingBar 2s linear forwards;
        ">
        </div>

    </div>

    `;

}

// =========================
// 単発
// =========================

function drawGacha(){

    let power = getPower();

    if(power < 10){

        alert("芯ポイントが不足しています");

        return;

    }

    savePower(power - 10);

    updatePower();

    startAnimation();

    setTimeout(()=>{

        const item = randomItem();

        let inventory = getInventory();

        inventory.push(item);

        saveInventory(inventory);

        displayResult(item);

        showInventory();

    },2000);

}

// =========================
// 10連
// =========================

function draw10(){

    let power = getPower();

    if(power < 100){

        alert("芯ポイントが不足しています");

        return;

    }

    savePower(power - 100);

    updatePower();

    startAnimation();

    setTimeout(()=>{

        let inventory = getInventory();

        let results = [];

        for(let i=0;i<10;i++){

            const item = randomItem();

            inventory.push(item);

            results.push(item);

        }

        saveInventory(inventory);

        let html = `

        <div style="
        font-size:42px;
        margin-bottom:35px;
        letter-spacing:5px;
        ">
            10連結果
        </div>

        <div class="multi-results">

        `;

        results.forEach(item=>{

            html += `

            <div class="multi-card"
            style="
            border-top:6px solid ${item.color};
            ">

                <div style="
                color:${item.color};
                font-weight:bold;
                letter-spacing:4px;
                ">
                    ${item.rarity}
                </div>

                <div style="
                font-size:28px;
                margin-top:15px;
                color:${item.color};
                font-weight:bold;
                ">
                    ${item.name}
                </div>

            </div>

            `;

        });

        html += `</div>`;

        document.getElementById("result")
        .innerHTML = html;

        showInventory();

    },2500);

}

// =========================
// 結果
// =========================

function displayResult(item){

    let effect = "";
    let bg = "#fff";

    document.body.style.animation = "";

    if(item.rarity === "SSR"){

        bg =
        "radial-gradient(circle, rgba(255,220,120,1) 0%, rgba(255,255,255,1) 70%)";

        effect = `
        animation:ssrFlash .7s infinite alternate;
        text-shadow:0 0 25px ${item.color};
        `;

        flash("#ffe066");

    }

    if(item.rarity === "UR"){

        bg =
        "radial-gradient(circle, rgba(122,0,255,0.95) 0%, rgba(10,0,30,1) 85%)";

        effect = `
        animation:urFlash .4s infinite alternate;
        text-shadow:0 0 35px ${item.color};
        `;

        flash("#7a00ff");

    }

    if(item.rarity === "LR"){

        bg =
        "radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(30,0,0,1) 70%, rgba(120,0,0,1) 100%)";

        effect = `
        animation:urFlash .2s infinite alternate;
        text-shadow:0 0 45px ${item.color};
        filter:brightness(2);
        `;

        flash("#000");

        document.body.style.animation =
        "shake .15s infinite";

    }

    document.getElementById("result")
    .style.background = bg;

    document.getElementById("result")
    .innerHTML =

    `

    <div style="
    font-size:26px;
    letter-spacing:10px;
    color:${item.color};
    ${effect}
    ">
        ${item.rarity}
    </div>

    <div style="
    margin-top:20px;
    font-size:88px;
    color:${item.color};
    font-weight:bold;
    ${effect}
    ">
        ${item.name}
    </div>

    <div style="
    margin-top:30px;
    color:#555;
    font-size:18px;
    line-height:2;
    ">
        ${item.desc}
    </div>

    <div style="
    margin-top:35px;
    font-size:30px;
    color:${item.color};
    font-weight:bold;
    ">
        ${item.type}
    </div>

    <div style="
    margin-top:20px;
    color:#777;
    ">
        排出率 ${item.chance}%
    </div>

    `;

}

// =========================
// フラッシュ
// =========================

function flash(color){

    const div = document.createElement("div");

    div.className = "flash";

    div.style.background = color;

    document.body.appendChild(div);

    setTimeout(()=>{

        div.remove();

    },600);

}

const giftCodes = {


"SHIN2026":{
    reward:500,
    message:"正式加入記念"
},

"HBLOVE":{
    reward:100,
    message:"HB信仰ボーナス"
},

"LUNBE":{

    message:"教祖様からの祝福"
}


};

// 使用済み取得
function getUsedCodes(){


return JSON.parse(
    localStorage.getItem("usedCodes")
) || [];


}

// 保存
function saveUsedCodes(data){


localStorage.setItem(
    "usedCodes",
    JSON.stringify(data)
);


}

// コード使用
function redeemCode(){


const input =
document.getElementById("codeInput");

const code =
input.value.trim().toUpperCase();

const usedCodes =
getUsedCodes();

// 存在確認
if(!giftCodes[code]){

    alert("存在しないコードです");

    return;

}

// 使用済み
if(usedCodes.includes(code)){

    alert("既に使用済みです");

    return;

}

// 報酬
const reward =
giftCodes[code].reward;

let power =
getPower();

power += reward;

savePower(power);

updatePower();

// 使用済み保存
usedCodes.push(code);

saveUsedCodes(usedCodes);

flash("#00ff88");

alert(
    `${giftCodes[code].message}\n\n+${reward} 芯ポイント`
);

input.value = "";
}

// =========================
// バーゲーム
// =========================

let miniInterval;
let position = 0;
let direction = 1;
let playing = false;

function startMiniGame(){

    if(playing) return;

    playing = true;

    miniInterval = setInterval(()=>{

        position += direction * 2;

        if(position >= 94){

            direction = -1;

        }

        if(position <= 0){

            direction = 1;

        }

        document.getElementById("movingBar")
        .style.left = position + "%";

    },10);

}

function stopMiniGame(){

    if(!playing) return;

    clearInterval(miniInterval);

    playing = false;

    if(position >= 44 && position <= 54){

        let power = getPower();

        power += 50;

        savePower(power);

        updatePower();

        document.getElementById("miniResult")
        .innerHTML =

        `
        <div style="color:#00aa88;">
        PERFECT +50芯ポイント
        </div>
        `;

    }else{

        document.getElementById("miniResult")
        .innerHTML =

        `
        <div style="color:#d10000;">
        芯が折れた...
        </div>
        `;

    }

}

// =========================
// 反応ゲーム
// =========================

let reactionStart = 0;
let reactionReady = false;

function startReactionGame(){

    const box =
    document.getElementById("reactionBox");

    reactionReady = false;

    box.style.background = "#ddd";

    box.innerHTML =
    "待て...";

    const delay =
    Math.random() * 3000 + 2000;

    setTimeout(()=>{

        reactionReady = true;

        reactionStart = Date.now();

        box.style.background = "#ff0000";

        box.style.color = "white";

        box.innerHTML =
        "押せ！！！！";

    },delay);

}

function reactionClick(){

    const box =
    document.getElementById("reactionBox");

    if(!reactionReady) return;

    const time =
    (Date.now() - reactionStart) / 1000;

    reactionReady = false;

    box.style.background = "#00aa88";

    box.innerHTML =
    `${time.toFixed(3)} 秒`;

    let reward = 0;

    if(time <= 0.15){

        reward = 100;

    }else if(time <= 0.25){

        reward = 60;

    }else if(time <= 0.4){

        reward = 30;

    }

    let power = getPower();

    power += reward;

    savePower(power);

    updatePower();

    document.getElementById("miniResult")
    .innerHTML =

    `
    <div>
    +${reward} 芯ポイント
    </div>
    `;

}

showInventory();
