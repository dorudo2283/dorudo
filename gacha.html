<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シャー芯ガチャ</title>

<style>
body{
    margin:0;
    font-family:"Yu Gothic";
    background:#f7f7f7;
    color:#111;
}

/* ヘッダー */
header{
    padding:18px;
    background:#fff;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
}

/* メイン */
.main{
    max-width:900px;
    margin:120px auto;
    padding:20px;
    background:#fff;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
    font-size:48px;
    text-align:center;
}

/* ボタン */
button{
    padding:14px 24px;
    margin:6px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.blue{background:#007bff;color:#fff;}
.red{background:#e53935;color:#fff;}
.yellow{background:#ffcc00;color:#000;}

/* 表示 */
#result{
    margin-top:30px;
    min-height:260px;
    text-align:center;
}

/* 大文字 */
.big{
    font-size:90px;
    font-weight:bold;
}

.rarity{
    font-size:22px;
    letter-spacing:4px;
}

/* 通知（普通表示） */
#log{
    margin-top:20px;
    padding:10px;
    background:#f0f0f0;
    border-radius:10px;
    min-height:40px;
    color:#333;
}

/* バー */
.bar{
    margin-top:20px;
    height:30px;
    background:#eee;
    border-radius:999px;
    position:relative;
}

.zone{
    position:absolute;
    left:45%;
    width:10%;
    height:100%;
    background:#2ecc71;
}

.pointer{
    position:absolute;
    width:6%;
    height:100%;
    background:#111;
    left:0%;
}
</style>
</head>

<body>

<header>
<div>シャー芯ガチャ</div>
</header>

<div class="main">

<div class="title">ガチャ</div>

<div>
<button class="yellow" onclick="add()">お告げ +1</button>
<button class="blue" onclick="draw()">単発 -10</button>
<button class="red" onclick="draw10()">10連 -100</button>
</div>

<div id="log">ここに通知が出る</div>

<div id="result">待機中</div>

<div class="bar">
<div class="zone"></div>
<div class="pointer" id="ptr"></div>
</div>

<button onclick="startBar()">開始</button>
<button onclick="stopBar()">停止</button>

<div id="reaction" onclick="reaction()">反応ゲーム</div>

</div>

<script>

let power=0;
let ptr=0;
let dir=1;
let interval;
let running=false;

function log(t){
document.getElementById("log").innerText=t;
}

function add(){
power++;
log("+1ポイント");
}

const items=[
{name:"HB",r:"R",c:"#666",p:70},
{name:"2B",r:"SR",c:"#1e88e5",p:20},
{name:"SSR芯",r:"SSR",c:"#ffcc00",p:8},
{name:"UR芯",r:"UR",c:"#e53935",p:2}
];

function rand(){
let r=Math.random()*100;
let t=0;
for(let i of items){
t+=i.p;
if(r<t)return i;
}
}

function draw(){
if(power<10){log("不足");return;}
power-=10;
log("ガチャ中...");

setTimeout(()=>{
show(rand());
},1200);
}

function draw10(){
if(power<100){log("不足");return;}
power-=100;
log("10連中...");

setTimeout(()=>{
let html="";
for(let i=0;i<10;i++){
let it=rand();
html+=`<div style="color:${it.c};font-size:18px;">
${it.r} ${it.name}</div>`;
}
document.getElementById("result").innerHTML=html;
},1200);
}

function show(i){
document.getElementById("result").innerHTML=`
<div class="rarity">${i.r}</div>
<div class="big" style="color:${i.c}">${i.name}</div>
`;
log("獲得：" + i.name);
}

/* バー */
function startBar(){
if(running)return;
running=true;
interval=setInterval(()=>{
ptr+=dir*2;
if(ptr>94||ptr<0)dir*=-1;
document.getElementById("ptr").style.left=ptr+"%";
},10);
}

function stopBar(){
running=false;
clearInterval(interval);

if(ptr>=45 && ptr<=55){
power+=50;
log("PERFECT +50");
}else if(ptr>=40 && ptr<=60){
power+=20;
log("GOOD +20");
}else{
log("MISS");
}
}

/* 反応ゲーム（意味改善） */
let ready=false;
let start=0;

setInterval(()=>{
if(Math.random()<0.015 && !ready){
ready=true;
start=Date.now();
document.getElementById("reaction").innerText="押せ！";
}
},1000);

function reaction(){
if(!ready)return;
let t=(Date.now()-start)/1000;
ready=false;

let reward=0;
if(t<0.2)reward=100;
else if(t<0.35)reward=50;
else if(t<0.5)reward=20;

power+=reward;
log(`反応 ${t.toFixed(3)}s +${reward}`);
document.getElementById("reaction").innerText="待機中";
}

</script>

</body>
</html>
